services:
  app:
    image: ${DC_IMAGE_NAME}:${DC_IMAGE_TAG}
    restart: unless-stopped
    ports:
      - ${DC_APP_PORT}:80
    env_file:
      - path: ./.env
        required: false
    volumes:
      - bot_storage:/var/www/storage

  scheduler:
    image: ${DC_CRON_IMAGE_NAME}:${DC_CRON_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    volumes:
      - bot_storage:/var/www/storage
  
  worker:
    image: ${DC_IMAGE_NAME}:${DC_IMAGE_TAG}
    restart: unless-stopped
    command: 
      - /bin/sh
      - -c
      - "php artisan queue:work"
    # deploy:
    #   replicas: 2
    volumes:
      - bot_storage:/var/www/storage
    env_file:
      - path: ./.env
        required: false



volumes:
  bot_storage:
