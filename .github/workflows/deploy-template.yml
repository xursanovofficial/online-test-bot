name: Deploy Template

on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    env:
      DC_IMAGE_NAME: ${{ github.event.repository.name }}
      DC_IMAGE_TAG: ${{ inputs.env_name }}
      DC_APP_PORT: ${{ vars.DEPLOYMENT_APP_PORT }}
      COMPOSE_PROJECT_NAME: ${{ github.event.repository.name }}
      COMPOSE_FILE_DEST: /home/jasur/${{ github.event.repository.name }}/docker-compose.yml
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install required tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync moreutils gettext-base

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOYER_SSH_PRIVATE_KEY }}" > ~/.ssh/deployer_key
          chmod 600 ~/.ssh/deployer_key

      - name: Substitute variables in docker-compose
        run: envsubst < ./docker-compose.yml | sponge ./docker-compose.yml

      - name: Transfer docker-compose file
        run: |
          rsync -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deployer_key" \
            --rsync-path="mkdir -p $(dirname $COMPOSE_FILE_DEST) && rsync" \
            ./docker-compose.yml \
            deployer@${{ vars.DEPLOYMENT_HOST }}:$COMPOSE_FILE_DEST

      - name: Transfer .env file
        run: |
          echo "${{ secrets.APP_DOTENV }}" > /tmp/app.env
          rsync -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/deployer_key" \
            /tmp/app.env \
            deployer@${{ vars.DEPLOYMENT_HOST }}:$(dirname $COMPOSE_FILE_DEST)/.env
          rm /tmp/app.env

      - name: Deploy on remote server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deployer_key \
            deployer@${{ vars.DEPLOYMENT_HOST }} "
            set -e &&
            export COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME &&
            docker login -u ${{ secrets.CI_REGISTRY_USER }} -p ${{ secrets.CI_REGISTRY_PASSWORD }} ${{ vars.CI_REGISTRY }} &&
            docker compose -f $COMPOSE_FILE_DEST pull &&
            docker compose -f $COMPOSE_FILE_DEST up --force-recreate --remove-orphans -d &&
            docker image prune -f"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deployer_key